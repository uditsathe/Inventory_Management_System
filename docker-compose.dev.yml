# Dev overrides: mount source code and enable hot reload.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  backend:
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      BACKEND_CORS_ORIGINS: http://localhost:3001

  frontend:
    ports:
      - "3001:3001"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tailwind.config.cjs:/app/tailwind.config.cjs
      - ./frontend/postcss.config.cjs:/app/postcss.config.cjs
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_DEV_PORT: "3001"
    command: npm run dev -- --host 0.0.0.0 --port 3001

volumes:
  frontend_node_modules:
